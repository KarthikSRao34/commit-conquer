name: Evaluate PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          rm -rf package-lock.json
          npm install --legacy-peer-deps

      - name: Install global tools
        run: npm install -g ts-node typescript

      - name: Create results directory
        run: mkdir -p eval_results

      - name: Run lint
        continue-on-error: true
        run: bash eval/run_lint.sh

      - name: Start backend
        continue-on-error: true
        run: |
          PORT=4000 CORS_ORIGIN=http://localhost:3000 ADMIN_SECRET=admin_dev_secret NODE_ENV=test \
          npm run start:server &
          echo $! > eval_results/backend.pid
          sleep 8

      - name: Build frontend
        continue-on-error: true
        run: cd apps/storefront && npm run build

      - name: Start frontend preview
        continue-on-error: true
        run: |
          cd apps/storefront && npx vite preview --port 3000 --host &
          echo $! > eval_results/frontend.pid
          sleep 5

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run load test
        continue-on-error: true
        run: bash eval/run_load_test.sh

      - name: Install Lighthouse CI
        continue-on-error: true
        run: npm install -g @lhci/cli

      - name: Run Lighthouse
        continue-on-error: true
        run: bash eval/run_lighthouse.sh

      - name: Run bundle check
        continue-on-error: true
        run: bash eval/run_bundle_check.sh

      - name: Compute score
        continue-on-error: true
        run: node eval/compute_score.js

      - name: Save score artifact
        uses: actions/upload-artifact@v4
        with:
          name: score-pr-${{ github.event.pull_request.number }}
          path: eval_results/
          retention-days: 1

  comment:
    runs-on: ubuntu-latest
    needs: evaluate
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download score artifact
        uses: actions/download-artifact@v4
        with:
          name: score-pr-${{ github.event.pull_request.number }}
          path: eval_results/

      - name: Post PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_CREATED_AT: ${{ github.event.pull_request.created_at }}
        run: node eval/post_comment.js