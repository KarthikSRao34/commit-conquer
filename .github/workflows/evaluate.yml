# .github/workflows/evaluate.yml  (replaces the original)
name: Evaluate PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Install global tools
        run: npm install -g ts-node typescript

      - name: Install test dependencies
        run: npm install --prefix tests --legacy-peer-deps

      - name: Create results directory
        run: |
          mkdir -p eval_results
          echo "${{ github.event.pull_request.number }}" > eval_results/pr_number.txt

      - name: Run tests
        continue-on-error: true
        run: |
          set +e
          cd tests
          npm test > ../eval_results/test_output.log 2>&1
          EXIT=$?
          PASSED=$([ "$EXIT" -eq 0 ] && echo true || echo false)
          printf '{"tests_passed":%s,"command":"npm test","exit_code":%s}\n' "$PASSED" "$EXIT" \
            > ../eval_results/test_result.json
          exit 0

      - name: Run lint
        continue-on-error: true
        run: bash eval/run_lint.sh

      - name: Start backend
        continue-on-error: true
        run: |
          PORT=4000 CORS_ORIGIN=http://localhost:3000 \
          ADMIN_SECRET=admin_dev_secret NODE_ENV=test \
          npm run start:server &
          echo $! > eval_results/backend.pid
          sleep 10

      - name: Build frontend
        continue-on-error: true
        run: cd apps/storefront && npm run build

      - name: Start frontend preview
        continue-on-error: true
        run: |
          cd apps/storefront && npx vite preview --port 3000 --host &
          sleep 20

      - uses: grafana/setup-k6-action@v1

      - name: Run load test
        continue-on-error: true
        run: bash eval/run_load_test.sh

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse
        continue-on-error: true
        run: bash eval/run_lighthouse.sh

      - name: Run bundle check
        continue-on-error: true
        run: bash eval/run_bundle_check.sh

      - name: Compute score
        run: node eval/compute_score.js

      - name: Save score artifact
        uses: actions/upload-artifact@v4
        with:
          name: score-run-${{ github.run_id }}
          path: eval_results/
          retention-days: 1